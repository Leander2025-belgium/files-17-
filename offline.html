<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a3f8f">
<title>Weerscoop offline</title>
<style>
html,body{margin:0;width:100%;min-height:100%;background:#07172f;color:#fff;font-family:Inter,system-ui,sans-serif;}
body{min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,rgba(47,147,255,.22),transparent 42%),linear-gradient(180deg,#102d59,#07172f 62%,#050f20);}
.offline{display:grid;justify-items:center;gap:14px;text-align:center;padding:calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);}
img{width:128px;height:128px;border-radius:28%;box-shadow:0 26px 70px rgba(0,0,0,.26);}
h1{margin:8px 0 0;font-size:30px;line-height:1;font-family:"Space Grotesk",Inter,system-ui,sans-serif;}
p{margin:0;max-width:320px;color:rgba(235,244,255,.72);line-height:1.45;}
</style>
</head>
<body>
<main class="offline">
  <img src="./icons/icon-192.png" alt="Weerscoop">
  <h1>Weerscoop is offline</h1>
  <p>Controleer je internetverbinding. Zodra je opnieuw online bent, haalt Weerscoop automatisch het laatste weer op.</p>
</main>
</body>
</html>
